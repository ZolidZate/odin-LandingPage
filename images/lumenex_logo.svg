<svg width="100" height="50" viewBox="0 0 100 50" xmlns="http://www.w3.org/2000/svg">

<defs>

<!-- background gradient -->
<linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
  <stop offset="0%" stop-color="#0a0f1c"></stop>
  <stop offset="100%" stop-color="#02050c"></stop>
</linearGradient>

<!-- fiber glow -->
<linearGradient id="fiber" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0%" stop-color="#00eaff"></stop>
  <stop offset="50%" stop-color="#7df9ff"></stop>
  <stop offset="100%" stop-color="#ffffff"></stop>
</linearGradient>

<!-- glow filter -->
<filter id="glow">
  <feGaussianBlur stdDeviation="1.2" result="blur"></feGaussianBlur>
  <feMerge>
    <feMergeNode in="blur"></feMergeNode>
    <feMergeNode in="SourceGraphic"></feMergeNode>
  </feMerge>
</filter>

</defs>

<!-- background -->
<rect width="100" height="50" fill="url(#bg)"></rect>

<!-- fiber cable base -->
<rect x="5" y="23" width="25" height="6" rx="2" fill="#1a1f2e"></rect>

<!-- fiber strands -->
<line x1="30" y1="26" x2="95" y2="10" stroke="url(#fiber)" stroke-width="1.5" filter="url(#glow)"></line>
<line x1="30" y1="26" x2="95" y2="20" stroke="url(#fiber)" stroke-width="1.5" filter="url(#glow)"></line>
<line x1="30" y1="26" x2="95" y2="30" stroke="url(#fiber)" stroke-width="1.5" filter="url(#glow)"></line>
<line x1="30" y1="26" x2="95" y2="40" stroke="url(#fiber)" stroke-width="1.5" filter="url(#glow)"></line>

<!-- light tips -->
<circle cx="95" cy="10" r="1.5" fill="#ffffff"></circle>
<circle cx="95" cy="20" r="1.5" fill="#ffffff"></circle>
<circle cx="95" cy="30" r="1.5" fill="#ffffff"></circle>
<circle cx="95" cy="40" r="1.5" fill="#ffffff"></circle>

<!-- brand text -->
<text x="6" y="16" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#e6faff" letter-spacing="1">
      LUMENEX
</text>

</svg>